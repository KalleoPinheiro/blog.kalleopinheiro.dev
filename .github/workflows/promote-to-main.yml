name: promote-to-main

on:
  pull_request:
    branches:
      - develop
    types:
      - closed

jobs:
  promote:
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true && startsWith(github.event.pull_request.head.ref, 'feature/')
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: check for existing pr to main
        id: existing-pr
        run: |
          existing=$(gh pr list \
            --repo "${{ github.repository }}" \
            --head "${{ github.event.pull_request.head.ref }}" \
            --base main \
            --state open \
            --json number \
            --jq 'length')
          echo "count=$existing" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: create promotion pr
        if: steps.existing-pr.outputs.count == '0'
        run: |
          gh pr create \
            --repo "${{ github.repository }}" \
            --base main \
            --head "${{ github.event.pull_request.head.ref }}" \
            --title "release: ${{ github.event.pull_request.title }}" \
            --body "Promotion of ${{ github.event.pull_request.html_url }} (merged by @${{ github.event.pull_request.merged_by.login }})."
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
