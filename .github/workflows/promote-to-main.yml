name: promote-to-main

on:
  pull_request:
    branches:
      - develop
    types:
      - closed

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.head.ref }}
  cancel-in-progress: false

jobs:
  promote:
    runs-on: ubuntu-latest
    if: |
      github.event.pull_request.merged == true &&
      startsWith(github.event.pull_request.head.ref, 'feature/')

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: check for existing pr to main
        id: existing-pr
        run: |
          existing=$(gh pr list \
            --repo "${{ github.repository }}" \
            --head "${{ github.event.pull_request.head.ref }}" \
            --base main \
            --state open \
            --json number \
            --jq 'length')
          echo "count=$existing" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GH_PAT_TOKEN }}

      - name: rebase on main
        if: steps.existing-pr.outputs.count == '0'
        run: |
          git fetch origin main
          git rebase origin/main || {
            git rebase --abort
            echo "❌ Rebase failed: conflicts detected on ${{ github.event.pull_request.head.ref }}"
            echo "Manual fix required:"
            echo "  git fetch origin main"
            echo "  git rebase origin/main"
            echo "  # resolve conflicts"
            echo "  git rebase --continue"
            echo "  git push --force-with-lease"
            exit 1
          }
          git push --force-with-lease origin ${{ github.event.pull_request.head.ref }}
          echo "✅ Rebased on main and pushed"

      - name: create promotion pr to main
        if: steps.existing-pr.outputs.count == '0'
        run: |
          gh pr create \
            --repo "${{ github.repository }}" \
            --base main \
            --head "${{ github.event.pull_request.head.ref }}" \
            --title "release: ${{ github.event.pull_request.title }}" \
            --body "Promotion of ${{ github.event.pull_request.html_url }} (merged by @${{ github.event.pull_request.merged_by.login }})."
        env:
          GH_TOKEN: ${{ secrets.GH_PAT_TOKEN }}