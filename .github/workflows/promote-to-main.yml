name: promote-to-main

on:
  push:
    branches:
      - develop

jobs:
  promote:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: develop

      - name: configure git
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"

      - name: check for existing pr to main
        id: existing-pr
        run: |
          existing=$(gh pr list \
            --repo "${{ github.repository }}" \
            --head "develop" \
            --base main \
            --state open \
            --json number \
            --jq 'length')
          echo "count=$existing" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GH_PAT_TOKEN }}

      - name: rebase develop on main
        if: steps.existing-pr.outputs.count == '0'
        run: |
          git fetch origin main
          git rebase origin/main || {
            git rebase --abort
            echo "❌ Rebase failed: develop has conflicts with main"
            echo "Manual fix required:"
            echo "  git fetch origin main"
            echo "  git rebase origin/main"
            echo "  # resolve conflicts"
            echo "  git rebase --continue"
            echo "  git push --force-with-lease origin develop"
            exit 1
          }
          git push --force-with-lease origin develop
          echo "✅ Rebased develop on main and pushed"

      - name: create promotion pr to main
        if: steps.existing-pr.outputs.count == '0'
        run: |
          gh pr create \
            --repo "${{ github.repository }}" \
            --base main \
            --head "develop" \
            --title "release: merge develop to main" \
            --body "Promotion of develop branch to main for production release."
        env:
          GH_TOKEN: ${{ secrets.GH_PAT_TOKEN }}
