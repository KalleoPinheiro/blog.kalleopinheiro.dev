name: validate

on:
  push:
    branches:
      - "feature/**"
  pull_request:
    branches:
      - develop

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: install dependencies
        run: pnpm install --frozen-lockfile

      - name: typecheck
        run: pnpm typecheck

      - name: lint
        run: pnpm lint

      - name: format check
        run: pnpm format

      - name: test
        run: pnpm test

      - name: snyk sast
        run: pnpm dlx snyk code test --severity-threshold=high
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: create promotion pr
        if: steps.existing-pr.outputs.count == '0'
        run: |
          gh pr create \
            --repo "${{ github.repository }}" \
            --base develop \
            --head "${{ github.event.pull_request.head.ref }}" \
            --title "release: ${{ github.event.pull_request.title }}" \
            --body "Promotion of ${{ github.event.pull_request.html_url }} (merged by @${{ github.event.pull_request.merged_by.login }})."
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
