version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: blog-postgres
    environment:
      POSTGRES_USER: ${DOCKER_POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${DOCKER_POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${DOCKER_POSTGRES_DB:-blog}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres-init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DOCKER_POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - blog-network

  app:
    build: .
    container_name: blog-app
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://${DOCKER_POSTGRES_USER:-postgres}:${DOCKER_POSTGRES_PASSWORD:-password}@postgres:5432/${DOCKER_POSTGRES_DB:-blog}
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-dev-secret-change-in-production}
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    networks:
      - blog-network
    command: pnpm dev

  prisma-studio:
    image: node:20-alpine
    container_name: blog-prisma-studio
    environment:
      DATABASE_URL: postgresql://${DOCKER_POSTGRES_USER:-postgres}:${DOCKER_POSTGRES_PASSWORD:-password}@postgres:5432/${DOCKER_POSTGRES_DB:-blog}
    working_dir: /app
    ports:
      - "5555:5555"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/node_modules
    networks:
      - blog-network
    command: sh -c "cd /app && npm install -g @prisma/cli && prisma studio"

volumes:
  postgres_data:
    driver: local

networks:
  blog-network:
    driver: bridge
