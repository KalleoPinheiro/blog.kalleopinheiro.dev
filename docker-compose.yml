services:
  postgres:
    image: postgres:15-alpine
    container_name: personal_blog_postgres
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-personal_blog_dev}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: personal_blog_app
    environment:
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@postgres:5432/${DB_NAME:-personal_blog_dev}
      DIRECT_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@postgres:5432/${DB_NAME:-personal_blog_dev}
      NODE_ENV: development
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "pnpm db:generate &&
             pnpm exec prisma migrate deploy &&
             pnpm db:seed &&
             pnpm dev"
    volumes:
      - .:/app
      - app_node_modules:/app/node_modules
      - app_prisma_generated:/app/src/generated

networks:
  default:
    name: personal_blog_network

volumes:
  postgres_data:
  app_node_modules:
  app_prisma_generated:
